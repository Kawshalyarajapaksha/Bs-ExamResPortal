<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | BS Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        /* Table Styles */
        .table-wrapper { 
            overflow-x: auto; 
            background: var(--card); 
            border-radius: 20px; 
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: collapse; color: var(--text); min-width: 400px; }
        /* Table Styles - Column Header සහ Data මැදට ගැනීමට */
    th { 
    text-align: center; /* Header center කිරීමට */
    padding: 15px; 
    color: var(--accent); 
    border-bottom: 2px solid var(--border); 
    font-size: 0.8rem; 
    text-transform: uppercase; 
    }

    td { 
    text-align: center; /* Data center කිරීමට */
    padding: 15px; 
    border-bottom: 1px solid var(--border); 
    font-size: 0.95rem; 
    }
        
        .tab-container { display: flex; gap: 10px; margin: 25px 0; }
        .tab { 
            flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--card); 
            color: var(--text-dim); cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .search-container {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 8px 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
        }
        .search-container input { flex: 1; background: none; border: none; padding: 12px; color: white; outline: none; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">🎓 BS <span>PORTAL</span></a>
        <a href="batch.html" class="nav-btn">Back</a>
    </nav>

    <div class="container" style="max-width: 800px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Exam Results</h1>
            <p style="color: var(--text-dim);">ප්‍රගතිය බැලීමට ඔබේ අංකය ඇතුළත් කරන්න.</p>
        </div>

        <div class="search-container">
            <input type="text" id="indexIn" placeholder="Index (e.g., BS/26/001)">
            <button onclick="searchResult()" class="btn" style="width: auto;">Search</button>
        </div>

        <div id="resultContent" style="display: none;">
            <div class="tab-container">
                <button class="tab active" onclick="switchTab('unit', this)">Unit Tests</button>
                <button class="tab" onclick="switchTab('mega', this)">Mega Exams</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Exam Name</th>
                            <th>Marks</th>
                            <th>Rank</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>

            <div class="card" style="padding: 20px;">
                <p style="text-align: left; font-weight: bold; margin-bottom: 20px; color: var(--text-dim);">Performance Graph (Exam Number)</p>
                <div style="height: 300px;">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart;

        const examData = {
            unit: Array.from({length: 18}, (_, i) => ({
                id: i + 1,
                name: `Unit Test ${i + 1}`,
                marks: Math.floor(Math.random() * (95 - 45 + 1)) + 45,
                rank: Math.floor(Math.random() * 50) + 1
            })),
            mega: Array.from({length: 6}, (_, i) => ({
                id: i + 1,
                name: `Mega Exam ${i + 1}`,
                marks: Math.floor(Math.random() * (90 - 50 + 1)) + 50,
                rank: Math.floor(Math.random() * 20) + 1
            }))
        };

        function searchResult() {
            if(!document.getElementById('indexIn').value) return;
            document.getElementById('resultContent').style.display = 'block';
            switchTab('unit', document.querySelector('.tab.active'));
        }

        function switchTab(type, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = [...examData[type]].reverse().map(item => `
        <tr>
            <td style="font-weight:bold;">${item.name}</td>
            <td style="color:var(--accent); font-weight:bold;">${item.marks}</td>
            <td style="display: flex; justify-content: center;"> 
                <span style="background:rgba(251,191,36,0.1); padding:4px 12px; border-radius:8px; color:var(--accent); min-width:80px; display:inline-block;">
                    Rank ${item.rank}
                </span>
            </td>
        </tr>
    `).join('');

    updateChart(examData[type]);
    }

        function updateChart(dataPoints) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    // මෙතන තමයි ලේබල් එක අංකයක් විතරක් වෙන්න හැදුවේ
                    labels: dataPoints.map(d => d.id), 
                    datasets: [{
                        label: 'Marks',
                        data: dataPoints.map(d => d.marks),
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: '#fbbf24'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                // Graph එක උඩට ගියාම "Test 01" කියලා පේන්න පොඩි trick එකක් දැම්මා
                                label: (context) => ` Marks: ${context.raw}%`
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
