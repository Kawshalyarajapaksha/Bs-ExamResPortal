<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BS Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">BS EXAM <span>UNIT</span></a>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">Home</a>
    </nav>

    <div class="container" style="max-width: 450px; margin-top: 60px;">
        <div class="card" style="padding: 50px; text-align: center; border-radius: 40px;">
            <div style="background: rgba(136, 139, 179, 0.1); width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            
            <h2 style="margin-bottom: 10px; font-size: 1.8rem;">Admin Access</h2>
            <p style="color: var(--text-dim); margin-bottom: 35px; font-size: 0.9rem;">Enter password to manage results.</p>
            
            <div style="margin-bottom: 25px;">
                <input type="password" id="adminPass" placeholder="Password" 
                    style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; color: white; text-align: center; font-size: 1.2rem; border-radius: 16px; outline: none;">
            </div>

            <button onclick="checkPass()" class="btn" style="width: 100%; padding: 18px;">LOGIN</button>
            
            <div id="errorMsg" style="color: #ef4444; margin-top: 15px; font-size: 0.85rem; font-weight: bold; display: none;">
                ❌ Incorrect Password!
            </div>
        </div>
    </div>

    <script>
    async function checkPass() {
    const user = "admin"; // දැනට එක admin කෙනෙක් ඉන්න නිසා username එක fixed කරමු
    const pass = document.getElementById('adminPass').value;
    const error = document.getElementById('errorMsg');
    const loginBtn = document.querySelector('button');

    if (!pass) return;

    loginBtn.innerText = "⏳ CHECKING...";
    loginBtn.disabled = true;

    try {
        // Database එකෙන් අදාළ username එකට password එක match වෙනවද බලනවා
        const { data, error: dbError } = await window.supabaseClient
            .from('admins')
            .select('*')
            .eq('username', user)
            .eq('password', pass)
            .single();

        if (dbError || !data) {
            // Password එක වැරදි නම්
            error.style.display = 'block';
            error.innerText = "❌ Invalid Password! Please try again.";
            
            // Shake effect
            const card = document.querySelector('.card');
            card.style.transform = 'translateX(10px)';
            setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => card.style.transform = 'translateX(0)', 200);
            
            loginBtn.innerText = "LOGIN";
            loginBtn.disabled = false;
        } else {
            // Login සාර්ථකයි නම්
            error.style.display = 'none';
            // Session එකක් විදියට පාවිච්චි කරන්න (Security එකට පොඩි help එකක්)
            localStorage.setItem('isAdmin', 'true');
            location.href = "admin-panel.html"; 
        }
    } catch (err) {
        console.error(err);
        alert("Something went wrong with database connection.");
        loginBtn.innerText = "LOGIN";
        loginBtn.disabled = false;
    }
}
    </script>
    <script>
    // Browser history eka clear karala exit wenna hadana hati
    (function (global) {
        if (typeof (global) === "undefined") {
            throw new Error("window is undefined");
        }

        var _hash = "!";
        var noBackPlease = function () {
            global.location.href += "#";

            // Hash eka wenas wenna hadala back button eka block karanawa
            global.setTimeout(function () {
                global.location.href += "!";
            }, 50);
        };

        global.onhashchange = function () {
            if (global.location.hash !== _hash) {
                global.location.hash = _hash;
            }
        };

        global.onload = function () {
            noBackPlease();

            // Screen eka touch kalama ho click kalama back history eka block wenna meka udaw wenawa
            document.body.onmousedown = function () {
                noBackPlease();
            };
        };
    })(window);

    // Meka dammahama user back button eka ebuwama page eken exit wenna balanawa
    window.addEventListener('popstate', function (event) {
        window.history.pushState(null, document.title, location.href);
    });
</script>
</body>
</html>
