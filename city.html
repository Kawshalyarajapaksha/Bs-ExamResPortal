<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select City | BS Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">BS EXAM <span>UNIT</span></a>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">Home</a>
    </nav>
    <div class="container">
        <h2 style="font-size: 2.5rem;">Select Your <span style="color:var(--accent)">Location</span></h2>
        <p style="color:var(--text-dim)">ඉදිරියට යාමට නගරයක් තෝරන්න</p>
        <div class="grid">
        <a href="batch.html" class="card"><h3>Kegalle</h3></a>
        <a href="batch.html" class="card"><h3>Rambukkana</h3></a>
        <a href="batch.html" class="card"><h3>Kandy</h3></a>
        <a href="batch.html" class="card"><h3>Matale</h3></a>
        <a href="" class=""><h3></h3></a>
        </div>
    </div>
 <script>
    // Page eka load weddi history eka 'Replace' karanawa parana ekata yanna bari wenna
    window.history.replaceState(null, document.title, location.href);

    window.addEventListener('popstate', function (event) {
        // User back button eka ebuwama aye me page ekatama 'Push' karanawa
        // Ethakota parana page ekata yanne nathuwa exit wenna balanawa
        window.history.pushState(null, document.title, location.href);
    });

    // Link ekak click kalama lassanata fade-out wenna oni nam meka udaw wenawa
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.hostname === window.location.hostname) {
                e.preventDefault();
                let target = this.href;
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.4s';
                setTimeout(() => {
                    window.location.href = target;
                }, 400);
            }
        });
    });
</script>
<script>
    const navBar = document.querySelector('.nav-container'); // Oyage nav bar eke class eka
    const mainContent = document.querySelector('.content-wrapper');

    if(navBar && mainContent) {
        // Nav bar eka hover weddi blur wenna
        navBar.addEventListener('mouseenter', () => {
            mainContent.classList.add('content-blur');
        });

        // Nav bar eken mouse eka ain weddi blur eka nathi wenna
        navBar.addEventListener('mouseleave', () => {
            mainContent.classList.remove('content-blur');
        });
    }
</script>
</body>
</html>
